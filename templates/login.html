<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Login</h1>

        <form method="POST">

            <input
                name="username"
                placeholder="Username"
                required
            >

            <br>

            <input
                name="password"
                type="password"
                placeholder="Password"
                required
            >

            <br>

            <button>Login</button>

        </form>

        <a href="/register">Create an account</a>

    </div>

</body>

</html>
