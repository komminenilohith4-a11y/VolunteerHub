<!DOCTYPE html>
<html>

<head>
    <title>Edit Entry</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
        }

        input,
        button {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
    </style>
</head>

<body>

    <div class="box">

        <h1>Edit Entry</h1>

        <form method="POST">

            <input
                name="name"
                value="{{ entry.name }}"
                required
            >

            <br>

            <input
                name="hours"
                type="number"
                step="0.1"
                value="{{ entry.hours }}"
                required
            >

            <br>

            <button>Save</button>

        </form>

        <a href="/">Back</a>

    </div>

</body>

</html>
