<!DOCTYPE html>
<html>

<head>
    <title>Volunteer Hours Tracker</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 40px;
        }

        h1 {
            font-size: 45px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }

        .entry {
            background: white;
            width: 600px;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
        }

        a {
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <h1>Volunteer Hours Tracker</h1>

    <h2>Total Hours: {{ total }}</h2>

    <form method="POST" action="/add">

        <input
            name="name"
            placeholder="Activity name"
            required
        >

        <input
            name="hours"
            type="number"
            step="0.1"
            placeholder="Hours"
            required
        >

        <button>Add</button>

    </form>

    <h3>Your Log</h3>

    {% for e in entries %}

    <div class="entry">

        <strong>{{ e.name }}</strong>

        — {{ e.hours }} hours

        <a href="/edit/{{ e.id }}">Edit</a>

        <a href="/delete/{{ e.id }}">Delete</a>

    </div>

    {% endfor %}

    <br>

    <a href="/logout">Logout</a>

</body>

</html>
